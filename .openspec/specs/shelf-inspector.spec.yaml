title: "shelf-inspector"
slug: "shelf-inspector"
type: feature
status: review
author: "Claude"
created_at: "2026-07-10"
updated_at: "2026-07-10"

roles:
  implementer: "@arananet"
  reviewer: "@arananet"
  qa: "@arananet"
